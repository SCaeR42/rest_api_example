services:
  # PHP-FPM контейнер
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rest_api_php
    volumes:
      # Проброс директорий для изменения файлов "на лету"
      - ./src:/var/www/html/src
      - ./data:/var/www/html/data
      - ./public:/var/www/html/public
      # Монтирование vendor и composer файлов для корректной работы автозагрузки
      - ./vendor:/var/www/html/vendor
      - ./composer.json:/var/www/html/composer.json
      - ./composer.lock:/var/www/html/composer.lock
      # Общий volume для Unix-сокета
      - php-socket:/var/run/php
    networks:
      - rest_api_network
    environment:
      - TZ=UTC
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/fpm-ping || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Nginx контейнер
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: rest_api_nginx
    ports:
      - "8080:80"
    volumes:
      # Проброс директорий для изменения файлов "на лету"
      - ./src:/var/www/html/src
      - ./data:/var/www/html/data
      - ./public:/var/www/html/public
      # Общий volume для Unix-сокета
      - php-socket:/var/run/php
    depends_on:
      - php
    networks:
      - rest_api_network
    restart: unless-stopped

volumes:
  php-socket:

networks:
  rest_api_network:
    driver: bridge
